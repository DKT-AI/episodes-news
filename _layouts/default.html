<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #24292f;
      max-width: 840px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    h1 { font-size: 1.75rem; border-bottom: 1px solid #d1d9e0; padding-bottom: 0.5rem; }
    h2 { font-size: 1.35rem; margin-top: 2rem; }
    h3 { font-size: 1.15rem; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul { padding-left: 1.5rem; }
    li { margin-bottom: 0.35rem; }
    hr { border: none; border-top: 1px solid #d1d9e0; margin: 2rem 0; }
    code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #d1d9e0;
      font-size: 0.8rem;
      color: #656d76;
      text-align: center;
    }
    footer a { color: #656d76; }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
  <footer>
    <a href="https://github.com/DKT-AI">DKT-AI</a>
    &middot;
    <a href="https://github.com/DKT-AI/episodes-news">episodes-news</a>
    &middot;
    Hosted on GitHub Pages
  </footer>
</body>
</html>
